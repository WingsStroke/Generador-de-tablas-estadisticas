<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Estadística Avanzada</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --hover-bg: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 900px; }

        h1, h2 {
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .controls {
            margin: 20px 0; padding: 20px;
            border: 1px solid var(--border-color);
            background-color: #fafafa;
        }

        input[type="file"] { margin-bottom: 15px; font-size: 16px; }

        button {
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s ease;
            margin-right: 10px;
        }

        button:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        table {
            width: 100%; border-collapse: collapse; margin-bottom: 30px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px; text-align: center;
        }

        th { background-color: var(--text-color); color: var(--bg-color); }
        tr:nth-child(even) { background-color: var(--hover-bg); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid var(--border-color); padding: 20px;
        }

        .stat-card h3 {
            margin-top: 0; font-size: 14px; text-transform: uppercase;
            border-bottom: 1px solid var(--border-color); padding-bottom: 8px;
        }

        .stat-row {
            display: flex; justify-content: space-between; margin-bottom: 8px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Generador de Tablas de Frecuencia</h1>
        
        <div class="controls">
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv"><br>
            <button id="processBtn">1. Procesar Datos</button>
            <button id="exportBtn" class="hidden">2. Descargar Excel con Fórmulas</button>
        </div>

        <div id="resultsArea" class="hidden">
            <h2>Tabla de Frecuencias</h2>
            <table id="freqTable">
                <thead>
                    <tr>
                        <th>Clase (Intervalo)</th>
                        <th>Marca de Clase (Xi)</th>
                        <th>Frec. Absoluta (fi)</th>
                        <th>Frec. Acumulada (Fi)</th>
                        <th>Frec. Relativa (hi)</th>
                        <th>Frec. Rel. Acum. (Hi)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="statsArea"></div>
        </div>
    </div>

    <script>
        let rawData = [];
        let numClasses = 0;
        let classesData = [];

        // Utilidad para limpiar ceros decimales innecesarios
        const cleanNum = (num, decimals = 4) => {
            if (isNaN(num)) return 0;
            const fixed = parseFloat(num.toFixed(decimals));
            return Number.isInteger(fixed) ? fixed : fixed;
        };

        document.getElementById('processBtn').addEventListener('click', processExcel);
        document.getElementById('exportBtn').addEventListener('click', exportToAdvancedExcel);

        function processExcel() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert("Sube un archivo Excel primero."); return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                
                rawData = [];
                json.forEach(row => {
                    row.forEach(cell => {
                        let num = parseFloat(cell);
                        if (!isNaN(num)) rawData.push(num);
                    });
                });

                if (rawData.length === 0) return alert("No se encontraron números.");

                rawData.sort((a, b) => a - b);
                generateFrequencyTable();
                renderWebStats();
                
                document.getElementById('resultsArea').classList.remove('hidden');
                document.getElementById('exportBtn').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        function generateFrequencyTable() {
            const n = rawData.length;
            const min = rawData[0];
            const max = rawData[n - 1];
            const range = max - min;
            
            numClasses = Math.round(1 + 3.322 * Math.log10(n));
            if (numClasses < 1) numClasses = 1;
            
            const amplitude = range / numClasses;
            const tbody = document.querySelector('#freqTable tbody');
            tbody.innerHTML = '';
            classesData = [];

            let currentMin = min;
            let cumulativeFreq = 0;

            for (let i = 0; i < numClasses; i++) {
                let currentMax = currentMin + amplitude;
                let isLast = (i === numClasses - 1);
                if (isLast) currentMax = max; 

                let count = rawData.filter(x => x >= currentMin && (isLast ? x <= currentMax : x < currentMax)).length;
                let xi = (currentMin + currentMax) / 2;
                cumulativeFreq += count;
                let hi = count / n;
                let Hi = cumulativeFreq / n;

                let rowLabel = `[${cleanNum(currentMin, 2)} - ${cleanNum(currentMax, 2)}${isLast ? ']' : ')'}`;

                classesData.push({ min: currentMin, max: currentMax, isLast, label: rowLabel, xi, fi: count, Fi: cumulativeFreq, hi, Hi });

                tbody.innerHTML += `
                    <tr>
                        <td>${rowLabel}</td>
                        <td>${cleanNum(xi)}</td>
                        <td>${count}</td>
                        <td>${cumulativeFreq}</td>
                        <td>${cleanNum(hi)}</td>
                        <td>${cleanNum(Hi)}</td>
                    </tr>
                `;
                currentMin = currentMax;
            }
        }

        function renderWebStats() {
            const n = rawData.length;
            const sum = rawData.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            
            // Medias adicionales
            const geoMean = Math.exp(rawData.reduce((sum, x) => sum + Math.log(x), 0) / n);
            const harMean = n / rawData.reduce((sum, x) => sum + (1 / x), 0);

            const mid = Math.floor(n / 2);
            const median = n % 2 !== 0 ? rawData[mid] : (rawData[mid - 1] + rawData[mid]) / 2;

            let freqMap = {}; let maxFreq = 0; let mode = [];
            rawData.forEach(num => {
                freqMap[num] = (freqMap[num] || 0) + 1;
                if (freqMap[num] > maxFreq) maxFreq = freqMap[num];
            });
            for (const key in freqMap) if (freqMap[key] === maxFreq) mode.push(Number(key));

            const variance = rawData.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (n - 1);
            const stdDev = Math.sqrt(variance);
            const range = rawData[n - 1] - rawData[0];

            const getP = (p) => {
                const idx = (p / 100) * (n - 1);
                const l = Math.floor(idx);
                return l + 1 >= n ? rawData[l] : rawData[l] * (1 - (idx % 1)) + rawData[l + 1] * (idx % 1);
            };

            document.getElementById('statsArea').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Tendencia Central</h3>
                        <div class="stat-row"><span>Media Aritmética:</span> <b>${cleanNum(mean)}</b></div>
                        <div class="stat-row"><span>Media Geométrica:</span> <b>${cleanNum(geoMean)}</b></div>
                        <div class="stat-row"><span>Media Armónica:</span> <b>${cleanNum(harMean)}</b></div>
                        <div class="stat-row"><span>Mediana:</span> <b>${cleanNum(median)}</b></div>
                        <div class="stat-row"><span>Moda:</span> <b>${mode.map(m=>cleanNum(m)).join(', ')}</b></div>
                    </div>
                    <div class="stat-card">
                        <h3>Dispersión</h3>
                        <div class="stat-row"><span>Rango:</span> <b>${cleanNum(range)}</b></div>
                        <div class="stat-row"><span>Varianza:</span> <b>${cleanNum(variance)}</b></div>
                        <div class="stat-row"><span>Desv. Estándar:</span> <b>${cleanNum(stdDev)}</b></div>
                    </div>
                    <div class="stat-card">
                        <h3>Posición (Cuartiles)</h3>
                        <div class="stat-row"><span>Q1 (25%):</span> <b>${cleanNum(getP(25))}</b></div>
                        <div class="stat-row"><span>Q2 (50%):</span> <b>${cleanNum(getP(50))}</b></div>
                        <div class="stat-row"><span>Q3 (75%):</span> <b>${cleanNum(getP(75))}</b></div>
                    </div>
                </div>
            `;
        }

        async function exportToAdvancedExcel() {
            const wb = new ExcelJS.Workbook();
            wb.creator = 'Generador Estadístico';

            // --- HOJA 1: DATOS BASE ---
            const wsDatos = wb.addWorksheet('Datos Base');
            wsDatos.getCell('A1').value = "DATOS ORDENADOS";
            wsDatos.getCell('A1').font = { bold: true, color: { argb: 'FFFFFFFF' } };
            wsDatos.getCell('A1').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF000000' } };
            
            rawData.forEach((val, i) => { wsDatos.getCell(`A${i + 2}`).value = val; });
            wsDatos.getColumn('A').width = 25;
            const n = rawData.length;
            const dataRange = `'Datos Base'!A2:A${n + 1}`;

            // --- HOJA 2: ANÁLISIS ---
            const ws = wb.addWorksheet('Análisis');
            
            // Estilos generales
            const headerStyle = {
                font: { bold: true, color: { argb: 'FFFFFFFF' } },
                fill: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF000000' } },
                alignment: { horizontal: 'center', vertical: 'middle' },
                border: { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} }
            };

            const centerAlign = { alignment: { horizontal: 'center' } };

            // Encabezados Tabla Frecuencia
            const headers = ['CLASE (INTERVALO)', 'MARCA DE CLASE (XI)', 'FREC. ABSOLUTA (FI)', 'FREC. ACUMULADA (FI)', 'FREC. RELATIVA (HI)', 'FREC. REL. ACUM. (HI)'];
            ws.addRow(headers);
            ws.getRow(1).eachCell((cell) => { Object.assign(cell, headerStyle); });

            // Rellenar Fórmulas en la Tabla de Frecuencias
            classesData.forEach((cls, index) => {
                const row = ws.addRow([
                    cls.label, 
                    { formula: `(${cls.min} + ${cls.max}) / 2`, result: cls.xi }, // Xi por fórmula simple
                    // Frecuencia Absoluta (COUNTIFS de Excel)
                    { 
                        formula: `COUNTIFS(${dataRange}, ">=${cls.min}", ${dataRange}, "${cls.isLast ? '<=' : '<'}${cls.max}")`, 
                        result: cls.fi 
                    },
                    // Frecuencia Acumulada
                    index === 0 
                        ? { formula: `C2`, result: cls.Fi } 
                        : { formula: `D${index + 1} + C${index + 2}`, result: cls.Fi },
                    // Frecuencia Relativa
                    { formula: `C${index + 2} / COUNT(${dataRange})`, result: cls.hi },
                    // Frecuencia Relativa Acumulada
                    index === 0 
                        ? { formula: `E2`, result: cls.Hi }
                        : { formula: `F${index + 1} + E${index + 2}`, result: cls.Hi }
                ]);

                // Formato numérico para eliminar ceros extra en Excel
                row.getCell(2).numFmt = '0.####';
                row.getCell(5).numFmt = '0.####';
                row.getCell(6).numFmt = '0.####';
                row.eachCell(cell => cell.alignment = { horizontal: 'center' });
            });

            // Ajustar ancho columnas
            ws.columns.forEach(column => column.width = 22);

            // --- SECCIÓN DE ESTADÍSTICAS ---
            let startRow = numClasses + 4;
            
            // Títulos de Estadísticas
            ws.getCell(`A${startRow}`).value = "TENDENCIA CENTRAL";
            ws.getCell(`C${startRow}`).value = "DISPERSIÓN";
            ws.getCell(`E${startRow}`).value = "POSICIÓN (CUARTILES)";
            
            [ws.getCell(`A${startRow}`), ws.getCell(`C${startRow}`), ws.getCell(`E${startRow}`)].forEach(cell => {
                cell.font = { bold: true };
                cell.border = { bottom: { style: 'medium' } };
            });

            // Fórmulas Nativas de Excel para Estadísticas
            const stats = [
                { col1: 'A', lbl1: 'Media Aritmética:', f1: `AVERAGE(${dataRange})`, col2: 'C', lbl2: 'Rango:', f2: `MAX(${dataRange})-MIN(${dataRange})`, col3: 'E', lbl3: 'Q1 (25%):', f3: `QUARTILE.INC(${dataRange}, 1)` },
                { col1: 'A', lbl1: 'Media Geométrica:', f1: `GEOMEAN(${dataRange})`, col2: 'C', lbl2: 'Varianza:', f2: `VAR.S(${dataRange})`, col3: 'E', lbl3: 'Q2 (50%):', f3: `MEDIAN(${dataRange})` },
                { col1: 'A', lbl1: 'Media Armónica:', f1: `HARMEAN(${dataRange})`, col2: 'C', lbl2: 'Desv. Estándar:', f2: `STDEV.S(${dataRange})`, col3: 'E', lbl3: 'Q3 (75%):', f3: `QUARTILE.INC(${dataRange}, 3)` },
                { col1: 'A', lbl1: 'Mediana:', f1: `MEDIAN(${dataRange})`, col2: '', lbl2: '', f2: '', col3: '', lbl3: '', f3: '' },
                { col1: 'A', lbl1: 'Moda:', f1: `MODE.SNGL(${dataRange})`, col2: '', lbl2: '', f2: '', col3: '', lbl3: '', f3: '' }
            ];

            stats.forEach((stat, i) => {
                let r = startRow + 2 + i;
                if(stat.lbl1) { ws.getCell(`${stat.col1}${r}`).value = stat.lbl1; ws.getCell(`B${r}`).value = { formula: stat.f1 }; ws.getCell(`B${r}`).numFmt = '0.####'; }
                if(stat.lbl2) { ws.getCell(`${stat.col2}${r}`).value = stat.lbl2; ws.getCell(`D${r}`).value = { formula: stat.f2 }; ws.getCell(`D${r}`).numFmt = '0.####'; }
                if(stat.lbl3) { ws.getCell(`${stat.col3}${r}`).value = stat.lbl3; ws.getCell(`F${r}`).value = { formula: stat.f3 }; ws.getCell(`F${r}`).numFmt = '0.####'; }
            });

            // Generar archivo y descargar
            const buffer = await wb.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            saveAs(blob, 'Analisis_Estadistico_Avanzado.xlsx');
        }
    </script>
</body>
</html>
